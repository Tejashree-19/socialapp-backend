version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: socialapp-postgres
    environment:
      POSTGRES_DB: socialdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: socialapp-redis
    ports:
      - "6380:6379"
